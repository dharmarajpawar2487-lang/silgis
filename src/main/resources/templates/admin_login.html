<!DOCTYPE html>

<html>
<head>

<title>Admin Login</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{

background:rgba(255,255,255,0.1);
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;

}

h2{
margin-bottom:30px;
}

input{

width:90%;
padding:12px;
margin:10px 0;

border:none;
border-radius:6px;

outline:none;

}

button{

width:100%;
padding:12px;

border:none;
border-radius:6px;

background:#00c6ff;

color:white;
font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#0072ff;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form action="/admin/login" method="post">

<input
type="text"
name="username"
placeholder="Enter Username"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>
</html>
